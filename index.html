<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CMS Website</title>
    <style>
        :root {
    --bg: #ffffff;
    --text: #333333;
    --primary: #007bff;
    --card-bg: #f9f9f9;
    --border: #eeeeee;
}

[data-theme="dark"] {
    --bg: #1a1a1a;
    --text: #f0f0f0;
    --primary: #3399ff;
    --card-bg: #2a2a2a;
    --border: #444444;
}

body { 
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    transition: background 0.3s ease;
    max-width: 800px; margin: 0 auto; padding: 20px; 
}

header { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 0; border-bottom: 2px solid var(--border);
}

nav a { margin-right: 15px; text-decoration: none; color: var(--text); font-weight: bold; }
nav a:hover { color: var(--primary); }

.controls { display: flex; gap: 10px; align-items: center; }

button#theme-toggle {
    background: var(--primary); color: white; border: none;
    padding: 8px 12px; border-radius: 20px; cursor: pointer;
}

article { 
    background: var(--card-bg); margin: 30px 0; padding: 25px; 
    border-radius: 12px; border: 1px solid var(--border); 
}

h2 { color: var(--primary); margin-top: 0; }
    </style>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <header>
    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/admin/" class="admin-link">Admin</a>
    </nav>
    
    <div class="controls">
        <button id="theme-toggle">🌙 Dark Mode</button>
    </div>
</header>

<h1>My Digital Garden</h1>
<div id="content-list"><p>Fetching your stories...</p></div>

    <script>
        // 1. Point this to your GitHub Repository "posts" folder
        const GITHUB_USERNAME = 'kby122319';
        const REPO_NAME = 'bukidcamp-cms';
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/posts`;

        async function fetchPosts() {
            const container = document.getElementById('content-list');
            try {
                const response = await fetch(API_URL);
                const files = await response.json();

                if (!files || files.length === 0) {
                    container.innerHTML = "<p>No posts found. Go to the Admin page to create one!</p>";
                    return;
                }

                container.innerHTML = ''; // Clear loading text

                // 2. Loop through each file in the /posts folder
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const postRes = await fetch(file.download_url);
                        const content = await postRes.text();
                        
                        // Simple parser to grab the Title between the first set of "---"
                        const title = content.split('title:')[1]?.split('\n')[0] || file.name;
                        const date = content.split('date:')[1]?.split('\n')[0] || "";
                        
                        const article = document.createElement('article');
                        article.innerHTML = `
                            <h2>${title}</h2>
                            <div class="date">${new Date(date).toLocaleDateString()}</div>
                            <p>${content.split('---').pop().substring(0, 200)}...</p>
                            <a href="${file.html_url}">View Source on GitHub</a>
                        `;
                        container.appendChild(article);
                    }
                }
            } catch (error) {
                container.innerHTML = "<p>Error loading posts. Make sure your repo is Public!</p>";
                console.error(error);
            }
        }

        fetchPosts();
        const toggleBtn = document.getElementById('theme-toggle');
const currentTheme = localStorage.getItem('theme');

// Check for saved user preference
if (currentTheme) {
    document.documentElement.setAttribute('data-theme', currentTheme);
    toggleBtn.textContent = currentTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
}

toggleBtn.addEventListener('click', () => {
    let theme = document.documentElement.getAttribute('data-theme');
    if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        toggleBtn.textContent = '🌙 Dark Mode';
    } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        toggleBtn.textContent = '☀️ Light Mode';
    }
});
    </script>
</body>
</html>
