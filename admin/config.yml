backend:
  name: git-gateway
  repo: kby122319/bukidcamp-cms
  branch: main # or master

media_folder: "images" # Where images will be uploaded
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "posts"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Static Pages"
    folder: "content" # This change enables the "Add New" button
    create: true # This is the magic line
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Permalink/URL", name: "slug", widget: "string", hint: "Example: portfolio (no spaces)"}
      - {label: "Body", name: "body", widget: "markdown"}
